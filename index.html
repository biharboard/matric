<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matric Result 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── SCREEN STYLES ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --orange: #E8611A;
  --orange-light: #F47B3A;
  --orange-pale: #FFF4EE;
  --navy: #0D2447;
  --navy2: #163366;
  --gold: #F0A500;
  --green: #1A7A3C;
  --red: #C0392B;
  --gray: #6B7280;
  --light: #F7F8FA;
  --border: #E2E8F0;
  --white: #FFFFFF;
}

body {
  font-family: 'Noto Sans', sans-serif;
  background: #F0F2F7;
  min-height: 100vh;
  color: #1A202C;
}

/* ══ CHECK SCREEN ══ */
#checkScreen {
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px 16px;
  background: linear-gradient(160deg, #0D2447 0%, #163366 50%, #1A4A6B 100%);
  position: relative; overflow: hidden;
}
#checkScreen::before {
  content: '';
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}

.check-box {
  background: var(--white);
  border-radius: 20px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.35);
  padding: 40px 36px 36px;
  width: 100%; max-width: 440px;
  position: relative; z-index: 1;
  animation: slideUp .5s ease;
}
@keyframes slideUp {
  from { opacity:0; transform: translateY(30px); }
  to   { opacity:1; transform: translateY(0); }
}

.check-heading {
  text-align: center; margin-bottom: 30px;
}
.check-heading h1 {
  font-family: 'Poppins', sans-serif;
  font-size: 1.6rem; font-weight: 800;
  color: var(--navy);
  line-height: 1.2;
}
.check-heading p {
  font-size: .82rem; color: var(--gray); margin-top: 5px;
}
.heading-line {
  width: 48px; height: 4px; border-radius: 2px;
  background: linear-gradient(90deg, var(--orange), var(--gold));
  margin: 10px auto 0;
}

.field { margin-bottom: 18px; }
.field label {
  display: block; font-size: .75rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .8px;
  color: var(--navy); margin-bottom: 7px;
}
.field input {
  width: 100%; padding: 12px 16px;
  border: 2px solid var(--border); border-radius: 10px;
  font-family: 'Noto Sans', sans-serif; font-size: 1rem;
  color: #1A202C; background: var(--light);
  transition: border-color .2s, background .2s, box-shadow .2s;
  outline: none;
}
.field input:focus {
  border-color: var(--orange); background: var(--white);
  box-shadow: 0 0 0 3px rgba(232,97,26,.12);
}
.field input::placeholder { color: #A0AEC0; font-size: .9rem; }

.btn-check {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--orange), var(--orange-light));
  color: var(--white); border: none; border-radius: 11px;
  font-family: 'Poppins', sans-serif; font-size: 1rem; font-weight: 700;
  cursor: pointer; letter-spacing: .3px;
  box-shadow: 0 6px 20px rgba(232,97,26,.4);
  transition: transform .15s, box-shadow .15s;
  margin-top: 4px;
}
.btn-check:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(232,97,26,.45); }
.btn-check:active { transform: translateY(0); }
.btn-check:disabled { opacity:.6; cursor:not-allowed; transform:none; }

.status-msg { margin-top: 14px; text-align: center; font-size: .86rem; min-height: 20px; }
.status-msg.err  { color: var(--red); font-weight: 600; }
.status-msg.ok   { color: var(--green); font-weight: 600; }
.status-msg.load { color: var(--navy); display: flex; align-items: center; justify-content: center; gap: 8px; }

.spinner {
  display: inline-block; width: 16px; height: 16px;
  border: 2.5px solid #CBD5E0; border-top-color: var(--navy);
  border-radius: 50%; animation: spin .75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ══ RESULT SCREEN ══ */
#resultScreen { display: none; padding: 24px 16px 60px; background: #F0F2F7; min-height: 100vh; }
#resultScreen.active { display: block; }

.top-bar {
  display: flex; gap: 12px; flex-wrap: wrap;
  margin-bottom: 20px; align-items: center;
}
.back-btn {
  background: var(--white); border: 2px solid var(--border); border-radius: 9px;
  padding: 9px 18px; font-family: 'Poppins', sans-serif; font-size: .85rem;
  font-weight: 600; color: var(--navy); cursor: pointer;
  display: flex; align-items: center; gap: 6px; transition: border-color .2s;
}
.back-btn:hover { border-color: var(--orange); color: var(--orange); }

.action-btn {
  padding: 9px 20px; border-radius: 9px; border: none;
  font-family: 'Poppins', sans-serif; font-size: .85rem; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; gap: 6px;
  transition: transform .15s, box-shadow .15s;
}
.btn-print {
  background: var(--navy); color: var(--white);
  box-shadow: 0 4px 14px rgba(13,36,71,.3);
}
.btn-print:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(13,36,71,.38); }
.btn-pdf {
  background: var(--orange); color: var(--white);
  box-shadow: 0 4px 14px rgba(232,97,26,.35);
}
.btn-pdf:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(232,97,26,.42); }
.btn-new {
  background: var(--green); color: var(--white);
  box-shadow: 0 4px 14px rgba(26,122,60,.3);
}
.btn-new:hover { transform: translateY(-1px); }

.save-notice {
  background: #ECFDF5; border: 1.5px solid #6EE7B7; border-radius: 8px;
  padding: 8px 16px; font-size: .8rem; color: var(--green); font-weight: 500;
  display: none; align-items: center; gap: 6px; margin-left: auto;
}
.save-notice.show { display: flex; }

/* ══ RESULT CARD (printable) ══ */
#resultCard {
  max-width: 860px; margin: 0 auto;
  background: var(--white); border-radius: 14px;
  box-shadow: 0 4px 30px rgba(0,0,0,.10);
  overflow: hidden;
}

/* disclaimer */
.disclaimer {
  background: #FFFBEB; border-bottom: 1px solid #FDE68A;
  padding: 10px 20px;
}
.disclaimer ol {
  padding-left: 18px; font-size: .75rem; color: #92400E; line-height: 1.7;
}
.disclaimer .web-copy {
  font-size: .72rem; font-weight: 700; color: #B45309; margin-bottom: 4px;
  text-transform: uppercase; letter-spacing: 1px;
}

/* BSEB official header */
.bseb-header {
  padding: 18px 24px;
  display: flex; align-items: center; gap: 16px;
  border-bottom: 3px solid var(--navy);
}
.bseb-logo {
  width: 70px; height: 70px; flex-shrink: 0;
  background: var(--navy); border-radius: 50%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: var(--white); font-size: .45rem; font-weight: 700; text-align: center;
  letter-spacing: .3px; line-height: 1.5; padding: 8px;
  border: 3px solid var(--gold);
}
.bseb-logo .logo-big { font-size: 1rem; font-weight: 800; }
.bseb-center { flex: 1; text-align: center; }
.bseb-center h1 {
  font-family: 'Poppins', sans-serif; font-size: 1.15rem; font-weight: 800;
  color: var(--navy); text-transform: uppercase; letter-spacing: .5px;
}
.bseb-center h3 {
  font-size: .9rem; font-weight: 600; color: var(--orange);
  text-transform: uppercase; margin-top: 2px;
}
.bseb-center h4 {
  font-size: .82rem; font-weight: 600; color: var(--navy); margin-top: 2px;
}

/* info table */
.info-table-wrap { padding: 16px 20px; border-bottom: 1px solid var(--border); }
.info-table { width: 100%; border-collapse: collapse; }
.info-table tr td {
  padding: 6px 10px; font-size: .87rem; border: 1px solid var(--border);
}
.info-table tr td:first-child {
  font-weight: 700; color: var(--navy); background: #F8FAFF;
  width: 35%;
}

/* marks table */
.marks-wrap { padding: 16px 20px; }
.marks-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
.marks-table thead tr { background: #F3B562; }
.marks-table thead th {
  padding: 9px 10px; text-align: center; font-weight: 700;
  color: var(--navy); border: 1px solid #D4973A;
}
.marks-table thead th:first-child { text-align: left; }
.marks-table tbody td {
  padding: 8px 10px; border: 1px solid var(--border); text-align: center;
}
.marks-table tbody td:first-child { text-align: left; font-weight: 500; }
.marks-table tfoot td {
  padding: 9px 10px; border: 1px solid var(--border);
  font-weight: 700; background: #F8FAFF; color: var(--navy);
}
.marks-table tfoot td:first-child { text-align: left; }

.result-row {
  background: var(--navy);
}
.result-row td {
  color: var(--white) !important;
  border-color: #2A4A8A !important;
  font-weight: 700 !important;
  font-size: .9rem !important;
  text-align: center !important;
}

.abbr-box {
  padding: 12px 20px; border-top: 1px solid var(--border);
  font-size: .76rem; color: var(--gray);
}
.abbr-box strong { color: var(--navy); text-decoration: underline; display: block; margin-bottom: 5px; }
.abbr-list { display: flex; flex-wrap: wrap; gap: 6px 24px; }

/* ══ PRINT STYLES ══ */
@media print {
  @page { size: A4; margin: 12mm 15mm; }
  body { background: white !important; }
  #checkScreen { display: none !important; }
  #resultScreen { display: block !important; padding: 0 !important; background: white !important; min-height: unset !important; }
  .top-bar, .save-notice { display: none !important; }
  #resultCard {
    box-shadow: none !important; border-radius: 0 !important;
    max-width: 100% !important; margin: 0 !important;
  }
  .bseb-logo { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .marks-table thead tr, .result-row, .info-table tr td:first-child {
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
}
</style>
</head>
<body>

<!-- ══ CHECK SCREEN ══ -->
<div id="checkScreen">
  <div class="check-box">
    <div class="check-heading">
      <h1>Matric Result 2026</h1>
      <p>Bihar School Examination Board</p>
      <div class="heading-line"></div>
    </div>

    <div class="field">
      <label>Roll Code</label>
      <input id="fRollCode" type="text" placeholder="Enter Roll Code" maxlength="10">
    </div>
    <div class="field">
      <label>Roll Number</label>
      <input id="fRollNo" type="text" placeholder="Enter Roll Number" maxlength="10">
    </div>
    <div class="field">
      <label>Mobile Number</label>
      <input id="fPhone" type="tel" placeholder="Enter Mobile Number" maxlength="13">
    </div>

    <button class="btn-check" id="checkBtn" onclick="checkResult()">Check Result</button>
    <div class="status-msg" id="statusMsg"></div>
  </div>
</div>

<!-- ══ RESULT SCREEN ══ -->
<div id="resultScreen">
  <div class="top-bar">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <button class="action-btn btn-print" onclick="printResult()">🖨️ Print</button>
    <button class="action-btn btn-pdf" onclick="downloadPDF()">⬇️ Download PDF</button>
    <!-- <div class="save-notice" id="saveNotice">✅ Saved to sheet!</div> -->
  </div>

  <div id="resultCard">
    <!-- filled by JS -->
  </div>
</div>

<script>
// ── Google Apps Script Web App URL (replace with yours) ──
const GS_URL = 'https://script.google.com/macros/s/AKfycbx0xFLvXzZnL-TgCtjVaBUcMm_0j8hORDRW86d6eXP-YAqNyyq8pYUamL6Fs5nljxl8/exec';

let currentStudent = null;

// Enter key
['fRollCode','fRollNo','fPhone'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') checkResult();
  });
});

async function checkResult() {
  const rollCode = document.getElementById('fRollCode').value.trim();
  const rollNo   = document.getElementById('fRollNo').value.trim();
  const phone    = document.getElementById('fPhone').value.trim();

  if (!rollCode || !rollNo || !phone) {
    setStatus('err', '❌ Please fill all three fields.');
    return;
  }

  const btn = document.getElementById('checkBtn');
  btn.disabled = true;
  setStatus('load', 'Fetching result…');

  try {
    const res  = await fetch(`https://api.matricbiharboard.com/result?roll_code=${encodeURIComponent(rollCode)}&roll_no=${encodeURIComponent(rollNo)}`);
    const json = await res.json();

    if (!json.success || !json.data) {
      setStatus('err', '❌ No result found. Please check your details.');
      return;
    }

    currentStudent = { ...json.data, phone };
    renderResult(json.data, phone);
    showResultScreen();
    saveToSheet(json.data, phone);   // fire-and-forget

  } catch(e) {
    setStatus('err', '❌ Connection error. Please try again.');
  } finally {
    btn.disabled = false;
  }
}

function renderResult(d, phone) {
  const subRows = (d.subjects || []).map(s => {
    const intPrac = s.ia_sci || s.project_work || s.practical || '-';
    const intPracVal = (s.ia_sci ? parseInt(s.ia_sci) : 0)
                     + (s.project_work ? parseInt(s.project_work) : 0)
                     + (s.practical ? parseInt(s.practical) : 0);
    const intDisplay = intPracVal > 0
      ? (s.project_work && s.literacy_activity
          ? `${s.project_work} + ${s.literacy_activity}`
          : (s.ia_sci || s.project_work || s.practical))
      : '-';
    return `
      <tr>
        <td>${s.sub_name}</td>
        <td>100</td>
        <td>030</td>
        <td>${s.theory || '-'}</td>
        <td>${intDisplay}</td>
        <td>-</td>
        <td><strong>${s.sub_total}</strong></td>
      </tr>`;
  }).join('');

  // separate english from others (it appears after result row in BSEB format)
  const engSubj = (d.subjects||[]).find(s=>s.sub_code==='113');
  const mainSubjects = (d.subjects||[]).filter(s=>s.sub_code!=='113');

  const mainRows = mainSubjects.map(s => {
    const intDisplay = (() => {
      if (s.project_work && s.literacy_activity) return `${s.project_work} + ${s.literacy_activity}`;
      return s.ia_sci || s.project_work || s.practical || '-';
    })();
    return `
      <tr>
        <td>${s.sub_name}</td>
        <td>100</td>
        <td>030</td>
        <td>${s.theory||'-'}</td>
        <td>${intDisplay}</td>
        <td>-</td>
        <td><strong>${s.sub_total}</strong></td>
      </tr>`;
  }).join('');

  const engRow = engSubj ? `
    <tr>
      <td>${engSubj.sub_name}</td>
      <td>100</td>
      <td>030</td>
      <td>${engSubj.theory||'-'}</td>
      <td>-</td>
      <td>-</td>
      <td><strong>${engSubj.sub_total}</strong></td>
    </tr>` : '';

  document.getElementById('resultCard').innerHTML = `
    // <div class="disclaimer">
    //   <div class="web-copy">WEB COPY</div>
    //   <ol>
    //     <li>Bihar School Examination Board is not responsible for any inadvertent error that may have crept in the results being published on NET.</li>
    //     <li>This result published on NET is for immediate information to the examinees.</li>
    //     <li>This is not a valid document.</li>
    //   </ol>
    // </div>

    <div class="bseb-header">
      // <div class="bseb-logo">
      //   <span class="logo-big">BSEB</span>
      //   <span>बिहार विद्यालय<br>परीक्षा समिति</span>
      // </div>
      <div class="bseb-center">
        <h1>Bihar School Examination Board</h1>
        <h3>Result</h3>
        <h4>Annual Secondary Examination - 2026</h4>
      </div>
      <div class="bseb-logo" style="opacity:0;pointer-events:none"></div>
    </div>

    <div class="info-table-wrap">
      <table class="info-table">
        <tr><td>BSEB Unique Id</td><td>${d.bseb_id}</td></tr>
        <tr><td>Student Name</td><td><strong>${d.name}</strong></td></tr>
        <tr><td>Father's Name</td><td>${d.father_name}</td></tr>
        <tr><td>School Name</td><td>${d.school_name}</td></tr>
        <tr><td>Roll Code</td><td>${d.roll_code}</td></tr>
        <tr><td>Roll Number</td><td>${d.roll_no}</td></tr>
        <tr><td>Registration Number</td><td>${d.reg_no}</td></tr>
      </table>
    </div>

    <div class="marks-wrap" style="overflow-x: auto; -webkit-overflow-scrolling: touch;">
      <table class="marks-table">
        <thead>
          <tr>
            <th colspan="7">Marks Details</th>
          </tr>
          <tr>
            <th>Subject</th>
            <th>F.Marks</th>
            <th>P.Marks</th>
            <th>Theory</th>
            <th>INT/PRAC</th>
            <th>Regulation</th>
            <th>Subject Total</th>
          </tr>
        </thead>
        <tbody>
          ${mainRows}
          <tr class="result-row">
            <td colspan="2">Final Result</td>
            <td colspan="2">${d.division || 'N/A'}</td>
            <td>Total Marks:</td>
            <td colspan="2">${d.total}</td>
          </tr>
          ${engRow}
        </tbody>
        <tfoot>
          <tr>
            <td colspan="7" style="font-size:.75rem;font-weight:400;color:#4A5568;padding:12px 10px">
              <strong style="color:var(--navy);text-decoration:underline">Abbreviation used:</strong><br>
              <span style="display:flex;flex-wrap:wrap;gap:4px 20px;margin-top:4px">
                <span>F → Fail</span><span>C → Compartmental</span><span>U/R → Under Regulation</span>
                <span>ABS → Absent</span><span>INT → Internal</span><span>PRAC → Practical</span>
                <span>CCE → Continuous and Comprehensive Evaluation</span>
                <span># → Greater Marks of Last Year</span><span>* → Grace</span>
              </span>
            </td>
          </tr>
        </tfoot>
      </table>
    </div>
  `;
}

function showResultScreen() {
  document.getElementById('checkScreen').style.display = 'none';
  document.getElementById('resultScreen').classList.add('active');
  window.scrollTo(0,0);
}

function goBack() {
  document.getElementById('resultScreen').classList.remove('active');
  document.getElementById('checkScreen').style.display = 'flex';
  setStatus('', '');
}

function printResult() {
  window.print();
}

function downloadPDF() {
  // Use browser's print-to-PDF
  const originalTitle = document.title;
  document.title = `Result_${currentStudent?.roll_no || 'BSEB'}_2026`;
  window.print();
  document.title = originalTitle;
}

async function saveToSheet(d, phone) {
  if (!GS_URL || GS_URL === 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') return;
  try {
    const subjectMarks = {};
    (d.subjects || []).forEach(s => { subjectMarks[s.sub_name] = s.sub_total; });

    await fetch(GS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name:        d.name,
        father_name: d.father_name,
        roll_code:   d.roll_code,
        roll_no:     d.roll_no,
        phone:       phone,
        school_name: d.school_name,
        division:    d.division,
        total:       d.total,
        subjects:    JSON.stringify(subjectMarks),
        saved_at:    new Date().toLocaleString('en-IN')
      })
    });
    document.getElementById('saveNotice').classList.add('show');
  } catch(e) {
    console.warn('Sheet save failed:', e);
  }
}

function setStatus(type, msg) {
  const el = document.getElementById('statusMsg');
  el.className = 'status-msg ' + type;
  el.innerHTML = type === 'load'
    ? `<span class="spinner"></span> ${msg}`
    : msg;
}
</script>

</body>
</html>
